name: Full E2E

# Full E2E tests connect to a running Chrome instance via CDP and require
# the user to be logged into Google Photos in that browser. They cannot run
# in a standard CI environment without additional infrastructure (e.g. a
# persistent Chrome service with an active session).
#
# Run manually from the Actions tab, or locally with: npm run test:e2e
# (Chrome must be running with --remote-debugging-port=9222)

on:
  workflow_dispatch:
    inputs:
      cdp_url:
        description: "Chrome CDP URL (default: http://localhost:9222)"
        required: false
        default: "http://localhost:9222"

permissions:
  contents: read

jobs:
  e2e:
    name: Full E2E (requires live Chrome + GP session)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install GPTK dependencies
        run: npm ci
        working-directory: Google-Photos-Toolkit

      - name: Build extension
        run: npm run build

      - name: Install Playwright + system deps
        run: npx playwright install chromium --with-deps

      - name: Full E2E tests
        env:
          CDP_URL: ${{ inputs.cdp_url }}
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
